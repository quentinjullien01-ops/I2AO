<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3D6E"/>
      <stop offset="100%" stop-color="#0F2849"/>
    </linearGradient>
  </defs>

  <!-- Fond carré arrondi style app-icon -->
  <rect x="0" y="0" width="120" height="120" rx="22" fill="url(#bgGrad)"/>

  <!-- Liseré subtil -->
  <rect x="0.75" y="0.75" width="118.5" height="118.5" rx="21.25"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- LETTRE I (barre verticale) -->
  <rect x="14" y="42" width="9" height="48" rx="1.5" fill="#FFFFFF"/>

  <!-- LETTRE A (triangulaire géométrique) -->
  <g>
    <path d="M 32 90 L 44 42 L 56 90"
          fill="none"
          stroke="#FFFFFF"
          stroke-width="6"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <line x1="37" y1="70" x2="51" y2="70"
          stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- EXPOSANT 2 (après le A, en haut à droite) -->
  <path d="M 60 38
           Q 60 30 66 30
           Q 72 30 72 36
           Q 72 41 66 46
           L 60 51
           L 72 51"
        fill="none"
        stroke="#FCD34D"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- LETTRE O (cercle avec viseur central — focus / analyse / IA) -->
  <g>
    <circle cx="94" cy="66" r="17" fill="none" stroke="#FFFFFF" stroke-width="6"/>
    <!-- Point central (cible) -->
    <circle cx="94" cy="66" r="3.5" fill="#FCD34D"/>
    <!-- Petits traits de viseur -->
    <line x1="94" y1="51" x2="94" y2="55"
          stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
    <line x1="94" y1="77" x2="94" y2="81"
          stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
    <line x1="79" y1="66" x2="83" y2="66"
          stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
    <line x1="105" y1="66" x2="109" y2="66"
          stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
